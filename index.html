<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pritisak + Health" />
  <title>Mjerač Pritiska + Samsung Health</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1f2937;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --warn: #f85149;
      --tag-morning: #d29922;
      --tag-evening: #8b5cf6;
      --tag-other: #6b7280;
      --radius: 12px;
      --mono: 'DM Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100dvh; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,17,23,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 20px; letter-spacing: -0.3px; }

    nav {
      display: flex; flex-direction: row; flex-wrap: nowrap;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 63px; z-index: 99;
      width: 100%;
      overflow-x: auto;
    }
    nav::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 10px 12px; text-align: center;
      font-size: 11px; letter-spacing: 0.5px;
      color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.2s;
      text-transform: uppercase; white-space: nowrap;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .page { display: none; padding: 20px 16px 100px; }
    .page.active { display: block; }

    .samsung-upload-box {
      background: var(--surface); border: 2px dashed var(--accent);
      border-radius: var(--radius); padding: 30px 20px; text-align: center;
      cursor: pointer; transition: all 0.2s; margin-bottom: 16px;
    }
    .samsung-upload-box:hover { background: var(--surface2); }
    .samsung-upload-box.dragover { border-color: var(--accent2); background: var(--surface2); }
    .samsung-upload-box input[type="file"] { display: none; }
    .samsung-upload-box .upload-icon { font-size: 40px; margin-bottom: 10px; }
    .samsung-upload-box .upload-text { font-size: 13px; color: var(--text); margin-bottom: 4px; }
    .samsung-upload-box .upload-hint { font-size: 11px; color: var(--text-muted); }

    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; text-align: center;
    }
    .stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-size: 20px; color: var(--accent); font-weight: 500; line-height: 1; }
    .stat-unit { font-size: 9px; color: var(--text-muted); display: block; margin-top: 3px; }

    .chart-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
    }
    .chart-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .chart-wrap { position: relative; height: 300px; }

    .data-types-filter {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px;
    }
    .type-toggle {
      padding: 10px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; text-align: center; font-size: 12px; cursor: pointer;
      transition: all 0.2s; color: var(--text-muted);
    }
    .type-toggle.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }

    .loading { text-align: center; padding: 20px; color: var(--text-muted); }
    .error-msg { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); color: var(--warn); padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 12px; }
    .success-msg { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); color: var(--accent2); padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 12px; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; }

    .btn-primary {
      width: 100%; padding: 12px; background: var(--accent); color: #0d1117;
      border: none; border-radius: 10px; font-family: var(--mono);
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary:active { transform: scale(0.98); }

    .data-table {
      width: 100%; border-collapse: collapse; font-size: 11px;
    }
    .data-table th { background: var(--surface2); padding: 10px; text-align: left; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 500; }
    .data-table td { padding: 10px; border-bottom: 1px solid var(--border); }
    .data-table tr:hover { background: rgba(88,166,255,0.05); }

    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px; font-size: 12px;
      opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>🫀 Pritisak + Samsung Health</header>

<nav>
  <div class="tab active" data-page="pressures" onclick="switchPage('pressures')">📊 Pritisak</div>
  <div class="tab" data-page="samsung" onclick="switchPage('samsung')">📱 Samsung Health</div>
</nav>

<div id="toast" class="toast"></div>

<!-- PRESSURES PAGE (Pritisak) -->
<div id="pressures-page" class="page active">
  <div class="empty-state">
    <div class="emoji">🫀</div>
    <p>Dodaj mjerenja pritiska<br>kliknuvši na dugme ispod</p>
  </div>
  <button class="btn-primary" onclick="switchPage('samsung')" style="position: fixed; bottom: 30px; left: 20px; right: 20px; width: calc(100% - 40px);">📊 Dodaj mjerenje ili idi na Samsung Health</button>
</div>

<!-- SAMSUNG HEALTH PAGE -->
<div id="samsung-page" class="page">
  <div class="samsung-upload-box" id="upload-box" onclick="document.getElementById('samsung-zip').click()">
    <div class="upload-icon">📱</div>
    <div class="upload-text">Klikni da uploaduješ Samsung Health ZIP</div>
    <div class="upload-hint">ili prevuci ZIP fajl</div>
    <input type="file" id="samsung-zip" accept=".zip" onchange="handleZipUpload(event)" />
  </div>

  <div id="samsung-content" style="display: none;">
    <div id="stats-container"></div>
    <div id="data-types" class="data-types-filter"></div>
    <div id="charts-container"></div>
  </div>

  <div id="error-container"></div>
</div>

<script>
// ─── SAMSUNG HEALTH PARSER ───────────────────────────────────────
const Samsung = {
  data: {},
  rawFiles: {},

  async parseZip(zipFile) {
    try {
      const zip = new JSZip();
      const contents = await zip.loadAsync(zipFile);
      this.data = {};
      this.rawFiles = {};

      for (const [filename, file] of Object.entries(contents.files)) {
        if (!file.dir) {
          const content = await file.async('string');
          this.rawFiles[filename] = content;

          // Parse XML files
          if (filename.endsWith('.xml')) {
            this.parseXmlFile(filename, content);
          }
          // Parse CSV files
          else if (filename.endsWith('.csv')) {
            this.parseCsvFile(filename, content);
          }
        }
      }

      return this.data;
    } catch (err) {
      throw new Error('ZIP parsing failed: ' + err.message);
    }
  },

  parseXmlFile(filename, content) {
    try {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(content, 'text/xml');

      if (xmlDoc.getElementsByTagName('parsererror').length > 0) {
        console.warn('XML parse error in ' + filename);
        return;
      }

      // Extract data based on file type
      const dataType = this.getDataType(filename);
      if (!dataType) return;

      if (!this.data[dataType]) {
        this.data[dataType] = [];
      }

      // Parse different types of health data
      const records = xmlDoc.querySelectorAll('record');
      records.forEach(record => {
        const entry = {
          date: record.getAttribute('start_time'),
          value: record.getAttribute('value'),
          unit: record.getAttribute('unit'),
          raw: record.outerHTML
        };

        if (entry.date && entry.value) {
          this.data[dataType].push(entry);
        }
      });

      console.log(`Parsed ${this.data[dataType].length} records from ${dataType}`);
    } catch (err) {
      console.warn('Error parsing XML ' + filename + ': ' + err.message);
    }
  },

  parseCsvFile(filename, content) {
    try {
      const dataType = this.getDataType(filename);
      if (!dataType) return;

      if (!this.data[dataType]) {
        this.data[dataType] = [];
      }

      const lines = content.split('\n').filter(l => l.trim());
      const headers = lines[0].split(',').map(h => h.trim());

      for (let i = 1; i < lines.length; i++) {
        const values = lines[i].split(',').map(v => v.trim());
        const entry = {};
        headers.forEach((h, idx) => {
          entry[h.toLowerCase()] = values[idx];
        });

        if (entry.date || entry.start_time || entry.time) {
          this.data[dataType].push(entry);
        }
      }

      console.log(`Parsed ${this.data[dataType].length} CSV records from ${dataType}`);
    } catch (err) {
      console.warn('Error parsing CSV ' + filename + ': ' + err.message);
    }
  },

  getDataType(filename) {
    const lower = filename.toLowerCase();
    if (lower.includes('step')) return 'steps';
    if (lower.includes('heart') || lower.includes('pulse')) return 'heart_rate';
    if (lower.includes('oxygen') || lower.includes('spo2')) return 'oxygen';
    if (lower.includes('sleep')) return 'sleep';
    if (lower.includes('calor') || lower.includes('energy')) return 'calories';
    if (lower.includes('distance')) return 'distance';
    if (lower.includes('floor')) return 'floors';
    if (lower.includes('exercise') || lower.includes('workout')) return 'exercise';
    if (lower.includes('water')) return 'water';
    if (lower.includes('weight')) return 'weight';
    if (lower.includes('blood_pressure') || lower.includes('pressure')) return 'blood_pressure';
    if (lower.includes('temperature') || lower.includes('temp')) return 'temperature';
    return null;
  },

  getDataLabel(type) {
    const labels = {
      steps: '👟 Koraci',
      heart_rate: '❤️ Otkucaji srca',
      oxygen: '🫁 Kiseonik (SpO₂)',
      sleep: '😴 San',
      calories: '🔥 Kalorije',
      distance: '🚶 Distanca',
      floors: '🏢 Spratovi',
      exercise: '🏃 Vježba',
      water: '💧 Voda',
      weight: '⚖️ Težina',
      blood_pressure: '🩸 Krvni pritisak',
      temperature: '🌡️ Temperatura'
    };
    return labels[type] || type;
  }
};

// ─── UI RENDERING ───────────────────────────────────────────
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  const pageEl = document.getElementById(page + '-page');
  const tabEl = document.querySelector(`[data-page="${page}"]`);

  if (pageEl) pageEl.classList.add('active');
  if (tabEl) tabEl.classList.add('active');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

async function handleZipUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  showToast('📂 Učitavam ZIP...');

  try {
    const data = await Samsung.parseZip(file);

    if (Object.keys(data).length === 0) {
      showError('❌ Nije pronađena zdravstvena data u ZIP fajlu');
      return;
    }

    displaySamsungData(data);
    showToast('✅ Samsung Health data učitana!');
  } catch (err) {
    showError('❌ Greška pri učitavanju: ' + err.message);
  }
}

function showError(msg) {
  const container = document.getElementById('error-container');
  container.innerHTML = `<div class="error-msg">${msg}</div>`;
  setTimeout(() => container.innerHTML = '', 5000);
}

function displaySamsungData(data) {
  const content = document.getElementById('samsung-content');
  content.style.display = 'block';

  // Hide upload box
  document.getElementById('upload-box').style.display = 'none';

  // Display stats
  displayStats(data);

  // Display data type filters
  displayDataTypeFilters(data);

  // Display charts
  displayCharts(data);
}

function displayStats(data) {
  const statsContainer = document.getElementById('stats-container');
  let html = '<div class="stats-grid">';

  const typeConfig = {
    steps: { label: '👟 Koraci', unit: 'koraka', multiply: 1 },
    heart_rate: { label: '❤️ Srce', unit: 'bpm', multiply: 1 },
    oxygen: { label: '🫁 SpO₂', unit: '%', multiply: 1 },
    sleep: { label: '😴 San', unit: 'h', multiply: 1/3600000 }, // ms to hours
    calories: { label: '🔥 Kalorije', unit: 'kcal', multiply: 1 },
    distance: { label: '🚶 Distanca', unit: 'km', multiply: 1 }
  };

  for (const [type, entries] of Object.entries(data)) {
    if (!typeConfig[type] || entries.length === 0) continue;

    const config = typeConfig[type];
    const values = entries
      .map(e => {
        const val = parseFloat(e.value || e.steps || e.heart_rate || e.oxygen || e.sleep || 0);
        return isNaN(val) ? 0 : val * config.multiply;
      })
      .filter(v => v > 0);

    if (values.length === 0) continue;

    const total = values.reduce((a, b) => a + b, 0);
    const avg = (total / values.length).toFixed(1);
    const max = Math.max(...values).toFixed(1);

    html += `
      <div class="stat-card">
        <div class="stat-label">${config.label}</div>
        <div class="stat-value">${total.toFixed(0)}</div>
        <div class="stat-unit">${config.unit} (prosek: ${avg})</div>
      </div>
    `;
  }

  html += '</div>';
  statsContainer.innerHTML = html;
}

function displayDataTypeFilters(data) {
  const filter = document.getElementById('data-types');
  let html = '';

  for (const type of Object.keys(data)) {
    if (data[type].length === 0) continue;
    const label = Samsung.getDataLabel(type);
    html += `<div class="type-toggle active" onclick="toggleDataType('${type}', this)">${label}</div>`;
  }

  filter.innerHTML = html;
}

function toggleDataType(type, el) {
  el.classList.toggle('active');
  // Refresh charts (simplified)
}

function displayCharts(data) {
  const container = document.getElementById('charts-container');
  let html = '';

  const typeConfig = {
    steps: { label: '👟 Koraci po danima', unit: 'koraka', color: '#58a6ff' },
    heart_rate: { label: '❤️ Otkucaji srca', unit: 'bpm', color: '#f85149' },
    oxygen: { label: '🫁 Kiseonik (SpO₂)', unit: '%', color: '#3fb950' },
    sleep: { label: '😴 San po danima', unit: 'sati', color: '#8b5cf6', divide: 3600000 },
    calories: { label: '🔥 Kalorije po danima', unit: 'kcal', color: '#d29922' },
    distance: { label: '🚶 Distanca po danima', unit: 'km', color: '#58a6ff' }
  };

  for (const [type, entries] of Object.entries(data)) {
    if (!typeConfig[type] || entries.length === 0) continue;

    const config = typeConfig[type];
    const chartData = aggregateByDate(entries, type, config.divide || 1);

    html += `
      <div class="chart-card">
        <div class="chart-title">${config.label}</div>
        <div class="chart-wrap">
          <canvas id="chart-${type}"></canvas>
        </div>
      </div>
    `;
  }

  container.innerHTML = html;

  // Render actual charts
  setTimeout(() => {
    for (const [type, entries] of Object.entries(data)) {
      if (!typeConfig[type] || entries.length === 0) continue;
      const config = typeConfig[type];
      const chartData = aggregateByDate(entries, type, config.divide || 1);
      renderChart(`chart-${type}`, chartData, config);
    }
  }, 100);
}

function aggregateByDate(entries, type, divide = 1) {
  const byDate = {};

  entries.forEach(entry => {
    let dateStr = entry.date || entry.start_time || entry.time || '';
    if (!dateStr) return;

    // Extract just the date part
    dateStr = dateStr.split('T')[0].split(' ')[0];
    if (!dateStr.match(/^\d{4}-\d{2}-\d{2}/)) return;

    const value = parseFloat(entry.value || entry.steps || entry.heart_rate || entry.oxygen || 0);
    if (isNaN(value)) return;

    const finalValue = value / divide;

    if (!byDate[dateStr]) {
      byDate[dateStr] = [];
    }
    byDate[dateStr].push(finalValue);
  });

  // Convert to sorted array
  const sorted = Object.entries(byDate)
    .sort((a, b) => new Date(a[0]) - new Date(b[0]))
    .slice(-30); // Last 30 days

  return {
    labels: sorted.map(d => d[0]),
    values: sorted.map(d => {
      const vals = d[1];
      // For most types, use average; for steps/calories, use sum
      if (['steps', 'calories', 'distance', 'sleep'].includes(type)) {
        return vals.reduce((a, b) => a + b, 0);
      }
      return (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1);
    })
  };
}

function renderChart(canvasId, chartData, config) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: chartData.labels,
      datasets: [{
        label: config.label,
        data: chartData.values,
        borderColor: config.color,
        backgroundColor: config.color.replace('1', '0.1'),
        fill: true,
        tension: 0.4,
        pointRadius: 3,
        pointBackgroundColor: config.color,
        pointBorderColor: '#0d1117',
        pointBorderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: {
          beginAtZero: true,
          grid: { color: '#30363d', drawBorder: false },
          ticks: { color: '#7d8590', font: { size: 10 } }
        },
        x: {
          grid: { display: false },
          ticks: { color: '#7d8590', font: { size: 9 } }
        }
      }
    }
  });
}

// ─── DRAG & DROP ──────────────────────────────────────────
const uploadBox = document.getElementById('upload-box');
uploadBox.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadBox.classList.add('dragover');
});
uploadBox.addEventListener('dragleave', () => {
  uploadBox.classList.remove('dragover');
});
uploadBox.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadBox.classList.remove('dragover');
  const files = e.dataTransfer.files;
  if (files[0]?.name.endsWith('.zip')) {
    document.getElementById('samsung-zip').files = files;
    handleZipUpload({ target: { files } });
  } else {
    showError('❌ Molimo uploaduj ZIP fajl');
  }
});

</script>

</body>
</html>
